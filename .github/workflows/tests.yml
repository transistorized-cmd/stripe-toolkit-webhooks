name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    name: Static analysis (Pint + PHPStan)
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, bcmath, intl, zip, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (type analysis)
        run: vendor/bin/phpstan analyse --no-progress

  test:
    runs-on: ubuntu-latest
    needs: static-analysis
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11.*'
            stripe: '^15.0'
            testbench: '9.*'
          - php: '8.3'
            laravel: '12.*'
            stripe: '^16.0'
            testbench: '10.*'
          - php: '8.4'
            laravel: '13.*'
            stripe: '^17.0'
            testbench: '11.*'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · Stripe ${{ matrix.stripe }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, bcmath, intl, zip, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Pin Laravel + Stripe versions
        run: |
          composer require \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/queue:${{ matrix.laravel }}" \
            "illuminate/routing:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "stripe/stripe-php:${{ matrix.stripe }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
